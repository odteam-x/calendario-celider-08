<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calendario 2026-2027 CELIDER-08</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="topbar">
    <div class="container logo-header">
      <div class="logo-title">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Calendario 2026-2027 CELIDER-08</h1>
      </div>

      <!-- Hamburger button (JS-driven, no checkbox needed) -->
      <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>

      <!-- Desktop controls -->
      <div class="controls">
        <button id="refreshBtn" class="btn">Actualizar</button>
      </div>
    </div>
  </header>

  <!-- ================= MOBILE MENU ================= -->
  <div class="menu-overlay" id="menuOverlay"></div>

  <div class="mobile-menu" id="mobileMenu" role="dialog" aria-modal="true" aria-label="Menú">
    <button class="mobile-menu-close" id="menuClose" aria-label="Cerrar menú">✕</button>
    <p class="mobile-menu-title">Menú</p>
    <div class="mobile-menu-items">
      <button id="refreshBtnMobile" class="btn">🔄 Actualizar</button>
      <!-- Agrega más opciones aquí si las necesitas -->
    </div>
  </div>

  <!-- ================= MAIN ================= -->
  <main class="container layout">
    <section id="calendarArea" class="months"></section>

    <aside class="sidebar">
      <h2>Próximos eventos</h2>
      <div id="upcoming"></div>

      <div class="legend">
        <h3 class="legend-title">Leyenda de eventos</h3>
        <div class="legend-items">
          <div class="legend-item"><span class="legend-dot tag-actividad"></span><span>Actividad</span></div>
          <div class="legend-item"><span class="legend-dot tag-visita"></span><span>Visita</span></div>
          <div class="legend-item"><span class="legend-dot tag-reunion"></span><span>Reunión</span></div>
          <div class="legend-item"><span class="legend-dot tag-evento"></span><span>Evento</span></div>
          <div class="legend-item"><span class="legend-dot tag-feriado"></span><span>Feriado</span></div>
        </div>
      </div>
    </aside>
  </main>

  <!-- ================= MODAL ================= -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <button id="modalClose" class="modal-close">✕</button>
      <h3 id="modalTitle"></h3>
      <p id="modalDate" class="muted"></p>
      <p id="modalDesc"></p>
      <img id="modalImg" class="modal-img" alt="">
      <a id="modalPicsBtn" class="pics-access" target="_blank" rel="noopener"
        onclick="window.open(this.href,'_blank'); return false;">
        📷 Acceder a fotos
      </a>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <div class="container">
      <small>ODTeam© - Todos los derechos reservados</small>
    </div>
  </footer>

  <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Volver arriba"></button>

  <!-- ================= SCRIPT ================= -->
  <script>
    /* ── Mobile menu ─────────────────────────────── */
    const hamburgerBtn = document.getElementById("hamburgerBtn");
    const menuOverlay  = document.getElementById("menuOverlay");
    const mobileMenu   = document.getElementById("mobileMenu");
    const menuClose    = document.getElementById("menuClose");

    function openMenu() {
      hamburgerBtn.classList.add("is-open");
      menuOverlay.classList.add("is-open");
      mobileMenu.classList.add("is-open");
      document.body.style.overflow = "hidden";
    }

    function closeMenu() {
      hamburgerBtn.classList.remove("is-open");
      menuOverlay.classList.remove("is-open");
      mobileMenu.classList.remove("is-open");
      document.body.style.overflow = "";
    }

    hamburgerBtn.addEventListener("click", openMenu);
    menuClose.addEventListener("click", closeMenu);
    menuOverlay.addEventListener("click", closeMenu);

    /* Actualizar desde el menú móvil */
    document.getElementById("refreshBtnMobile").addEventListener("click", () => {
      closeMenu();
      setTimeout(() => location.reload(), 200);
    });

    /* ── Calendar data ───────────────────────────── */
    const SHEET_ID   = "1M6KmCyI9nW21cD2cLER0POZceWOwQTA25n5sRXzjdYg";
    const SHEET_NAME = "calendar";
    const SHEET_URL  = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;
    const YEAR       = 2026;

    const MONTHS     = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const DAYS_SHORT = ["D","L","M","M","J","V","S"];
    const qs = s => document.querySelector(s);

    const TODAY      = new Date();
    const THIS_YEAR  = TODAY.getFullYear();
    const THIS_MONTH = TODAY.getMonth();
    const THIS_DAY   = TODAY.getDate();

    let EVENTS = [];

    const calendarArea = qs("#calendarArea");
    const upcomingEl   = qs("#upcoming");
    const refreshBtn   = qs("#refreshBtn");
    const modal        = qs("#modal");
    const modalTitle   = qs("#modalTitle");
    const modalDate    = qs("#modalDate");
    const modalDesc    = qs("#modalDesc");
    const modalImg     = qs("#modalImg");
    const modalPicsBtn = qs("#modalPicsBtn");
    const modalClose   = qs("#modalClose");
    const scrollTopBtn = qs("#scrollTopBtn");

    /* ── Helpers ─────────────────────────────────── */
    function parseDate(str) {
      if (!str) return null;
      const [y, m, d] = str.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function toKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
    }

    function dateRangeLabel(ev) {
      const opts  = { day: "numeric", month: "short" };
      const start = ev._dateStart.toLocaleDateString("es-ES", opts);
      if (ev._days === 1) {
        return ev._dateStart.toLocaleDateString("es-ES", { weekday:"short", day:"numeric", month:"short" });
      }
      return `${start} – ${ev._dateEnd.toLocaleDateString("es-ES", opts)}`;
    }

    /* ── Load ────────────────────────────────────── */
    async function loadEvents() {
      const res  = await fetch(SHEET_URL);
      const data = await res.json();

      EVENTS = data.map(r => {
        const dateStart = parseDate(r.date?.trim());
        if (!dateStart) return null;
        const dateEnd = parseDate(r.date_end?.trim()) || new Date(dateStart);
        const days    = Math.round((dateEnd - dateStart) / 86400000) + 1;
        return {
          date:        r.date?.trim(),
          date_end:    r.date_end?.trim() || "",
          title:       r.title?.trim(),
          description: r.description?.trim(),
          image:       r.image?.trim(),
          pictures:    r.pictures?.trim(),
          type:        (r.type || "evento").toLowerCase().trim(),
          _dateStart:  dateStart,
          _dateEnd:    dateEnd,
          _days:       days
        };
      }).filter(Boolean).filter(e => e.title);

      renderCalendar();
      renderUpcoming();
    }

    /* ── Day map ─────────────────────────────────── */
    function buildDayMap() {
      const map = {};
      EVENTS.forEach(ev => {
        if (ev._days === 1) {
          map[toKey(ev._dateStart)] = { ev, position: "single" };
          return;
        }
        const cur = new Date(ev._dateStart);
        while (cur <= ev._dateEnd) {
          const key = toKey(cur);
          let position;
          if (cur.getTime() === ev._dateStart.getTime())    position = "start";
          else if (cur.getTime() === ev._dateEnd.getTime()) position = "end";
          else                                               position = "middle";
          map[key] = { ev, position };
          cur.setDate(cur.getDate() + 1);
        }
      });
      return map;
    }

    /* ── Render calendar ─────────────────────────── */
    function renderCalendar() {
      calendarArea.innerHTML = "";
      const dayMap = buildDayMap();
      const isCurrentYear = YEAR === THIS_YEAR;
      const monthSections = [];

      for (let m = 0; m < 12; m++) {
        const isPast    = isCurrentYear && m < THIS_MONTH;
        const isCurrent = isCurrentYear && m === THIS_MONTH;

        const section = document.createElement("section");
        section.className = "month-card";
        section.id = `month-${m + 1}`;
        if (isPast)    section.classList.add("is-past");
        if (isCurrent) section.classList.add("is-current");
        section.innerHTML = `<h2 class="month-title">${MONTHS[m]}</h2>`;

        const grid = document.createElement("div");
        grid.className = "month-grid";

        DAYS_SHORT.forEach(d => {
          const h = document.createElement("div");
          h.className = "day-header";
          h.textContent = d;
          grid.appendChild(h);
        });

        const firstDay    = new Date(YEAR, m, 1).getDay();
        const daysInMonth = new Date(YEAR, m + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement("div"));

        for (let d = 1; d <= daysInMonth; d++) {
          const key   = `${YEAR}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const entry = dayMap[key];
          const cell  = document.createElement("button");
          cell.className = "day-cell";

          if (isCurrent && d === THIS_DAY) cell.classList.add("is-today");

          if (entry) {
            const { ev, position } = entry;
            cell.classList.add("has-event", `tag-${ev.type}`, `range-${position}`);
            cell.innerHTML = `<span>${d}</span>`;
            if (position === "start" && ev._days > 1) {
              cell.innerHTML += `<span class="range-badge">${ev._days}d</span>`;
            }
            cell.onclick = () => openModal(ev);
          } else {
            cell.innerHTML = `<span>${d}</span>`;
          }

          grid.appendChild(cell);
        }

        section.appendChild(grid);
        monthSections.push({ section, isPast, isCurrent });
      }

      /* Current + future first */
      monthSections.filter(ms => !ms.isPast).forEach(ms => calendarArea.appendChild(ms.section));

      const past = monthSections.filter(ms => ms.isPast);
      if (past.length > 0) {
        const divider = document.createElement("div");
        divider.className = "past-months-divider";
        divider.textContent = "Meses anteriores";
        calendarArea.appendChild(divider);
        past.forEach(ms => calendarArea.appendChild(ms.section));
      }

      /* Scroll to current month */
      if (isCurrentYear) {
        requestAnimationFrame(() => {
          const cur = qs(`#month-${THIS_MONTH + 1}`);
          if (cur) {
            const headerH = qs(".topbar")?.offsetHeight || 62;
            window.scrollTo({ top: cur.getBoundingClientRect().top + window.scrollY - headerH - 14, behavior: "instant" });
          }
        });
      }
    }

    /* ── Render upcoming ─────────────────────────── */
    function renderUpcoming() {
      upcomingEl.innerHTML = "";
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const upcoming = EVENTS
        .filter(ev => ev._dateEnd >= today)
        .sort((a, b) => a._dateStart - b._dateStart)
        .slice(0, 6);

      if (upcoming.length === 0) {
        upcomingEl.innerHTML = `<p style="opacity:.45;font-size:.88rem;">No hay próximos eventos.</p>`;
        return;
      }

      upcoming.forEach(ev => {
        const card = document.createElement("div");
        card.className = `upcoming-card tag-${ev.type}`;
        const durationHtml = ev._days > 1 ? `<span class="duration-pill">${ev._days} días</span>` : "";
        card.innerHTML = `
          <strong class="event-name">${ev.title}</strong>
          <div class="upcoming-meta">
            <span class="event-date">${dateRangeLabel(ev)}</span>
            ${durationHtml}
          </div>
        `;
        card.onclick = () => openModal(ev);
        upcomingEl.appendChild(card);
      });
    }

    /* ── Modal ───────────────────────────────────── */
    function openModal(ev) {
      modalTitle.textContent = ev.title;
      modalDate.textContent  = ev._days > 1
        ? `${ev.date}  →  ${ev.date_end}  (${ev._days} días)`
        : ev.date;
      modalDesc.textContent  = ev.description;
      modalImg.style.display = ev.image ? "block" : "none";
      modalImg.src           = ev.image || "";
      if (ev.pictures) {
        modalPicsBtn.href          = ev.pictures;
        modalPicsBtn.style.display = "flex";
      } else {
        modalPicsBtn.style.display = "none";
      }
      modal.classList.add("open");
    }

    modalClose.onclick = () => modal.classList.remove("open");
    modal.onclick      = e => e.target === modal && modal.classList.remove("open");
    refreshBtn.onclick = () => location.reload();

    loadEvents();

    window.addEventListener("scroll", () => {
      scrollTopBtn.classList.toggle("show", window.scrollY > 300);
    });

    scrollTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>

</body>
</html>
